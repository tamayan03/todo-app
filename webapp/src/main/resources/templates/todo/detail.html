<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>ToDo詳細</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Yu Gothic",sans-serif;
    background:#f4f6f9;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:30px;
}

th{
    width:180px;
    background:#4f46e5;
    color:white;
    padding:14px;
    text-align:left;
}

td{
    padding:14px;
    border-bottom:1px solid #ddd;
    background:#fafafa;
}

.button-area{
    display:flex;
    justify-content:center;
    gap:15px;
}

.button{

    display:inline-block;

    padding:10px 24px;

    border:none;

    border-radius:8px;

    text-decoration:none;

    color:white;

    font-weight:bold;

    cursor:pointer;
}

.edit{
    background:#3b82f6;
}

.edit:hover{
    background:#2563eb;
}

.delete{
    background:#ef4444;
}

.delete:hover{
    background:#dc2626;
}

.back{
    background:#10b981;
}

.back:hover{
    background:#059669;
}

form{
    display:inline;
}

</style>

</head>

<body>

<div class="container">

<h2>📋 ToDo詳細</h2>

<table>

    <tr>
        <th>ID</th>
        <td th:text="${todo.id}"></td>
    </tr>

    <tr>
        <th>タイトル</th>
        <td th:text="${todo.todo}"></td>
    </tr>

    <tr>
        <th>詳細</th>
        <td th:text="${todo.detail}"></td>
    </tr>

    <tr>
        <th>状態</th>
        <td th:text="${todo.isCompleted ? '☑ 完了' : '☒ 未完了'}"></td>
    </tr>

    <tr>
        <th>締切日</th>

        <td>

            <span
                th:if="${todo.dueDate != null}"
                th:text="${#temporals.format(todo.dueDate,'yyyy/MM/dd')}">
            </span>

            <span
                th:if="${todo.dueDate == null}">
                －
            </span>

        </td>

    </tr>

    <tr>
        <th>登録日時</th>

        <td
            th:text="${todo.createdAt.format(
            T(java.time.format.DateTimeFormatter)
            .ofPattern('yyyy/MM/dd HH:mm:ss'))}">
        </td>

    </tr>

    <tr>
        <th>更新日時</th>

        <td
            th:text="${todo.updatedAt.format(
            T(java.time.format.DateTimeFormatter)
            .ofPattern('yyyy/MM/dd HH:mm:ss'))}">
        </td>

    </tr>

</table>

<div class="button-area">

    <a
        th:href="@{/todos/edit/{id}(id=${todo.id})}"
        class="button edit">

        編集

    </a>

    <form
        th:action="@{/todos/delete/{id}(id=${todo.id})}"
        method="post">

        <button
            type="submit"
            class="button delete"
            onclick="return confirm('このToDoを削除しますか？');">

            削除

        </button>

    </form>

    <a
        th:href="@{/todos}"
        class="button back">

        一覧へ戻る

    </a>

</div>

</div>

</body>

</html>
